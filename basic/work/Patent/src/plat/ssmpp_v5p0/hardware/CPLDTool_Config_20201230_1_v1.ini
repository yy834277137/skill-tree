[]                     睿影科技海思平台设备BCSR定义
;CPLD配置工具的配置文件
[info_start]
[]
;直到[info_end]之前，可写任意信息，没有限制


[格式规范]
;[0x10][4]
;[sub=4][默认选项=0b1110] 海思系列芯片型号
其中：
;[0x10]:项目的地址（字节号）
;[4]：表示有4个子项（如果没有子项的，地址后面没有[]）
;[sub=4]：表示第四个子项（16bit的占用最高几个bit）
;[默认选项=0b1110]:当前项的其中一个值，载入ini文件时，下拉框自动选择这个项
;海思系列芯片型号：该项的名称，随便写，放在[]外面且跟在最后面就行

;[]：中间空白的方括号为了方便查看，用来隔开各个项，自己也可以随意添加

配置项的格式：
;数字=任意字符串
;数字：可以是2/10/16进制

;[0x00]：为cpld魔数字不要改动
;[0x14]和[0x20]：每一行内容对应的是一个文本框，直接填写数字就是默认值


[备注]
最好使用notepad++打开，Alt+0快捷键可以折叠所有项目
语言要求为MS ini file，字符格式GB2312
[版本信息]
;可以将版本信息内容填写到下方[cpld_version]后面的[]内，在界面显示
;v1.0.7  2020.05.15
;v1.0.8  2020.05.22 1、增加V1.0.8版本号；
;v1.0.9  2020.06.12 1、增加V1.0.9版本号；
;					2、6月9日讨论后第一版本；
;					3、增加MAC默认类型0b00000000=无
[]
[info_end]
